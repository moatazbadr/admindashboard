<body>
<div class="container">
  <div class="row  ">
    <div class="col-md-6  offset-md-3">
      <div class="card my-5 ">
        <form class="card-body cardbody-color p-lg-2 secondContainer">
          <h2 class="text-center text-dark mt-5">Edu Plat Admin Login </h2>

          <div class="text-center">
            <img [src]="getImagePath()" class="img-fluid profile-image-pic img-thumbnail rounded-circle my-2"
              width="200px" alt="profile">
          </div>

          <div class="d-flex justify-content-center ">

          <div class="mb-3  col-8">
            <input type="text" class="form-control" id="Username" aria-describedby="emailHelp" [(ngModel)]="AdminUser.email"
              placeholder="Email" name="email">
          </div>
          </div>
          <div class=" d-flex justify-content-center">

            <div class="mb-3 col-8 ">
              <input type="password" class="form-control" id="password" placeholder="password" [(ngModel)]="AdminUser.password" name="password">
            </div>
          </div>

         <div class="d-flex justify-content-center">

           <div class="text-center  col-8"><button (click)="OnLogin()" type="submit" class="btn btn-color px-5 mb-5 w-100" >Login</button></div>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
</body>
